<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
      crossorigin="anonymous"
    />
    <title>Lista de Tareas - Franklin</title>
  </head>
  <body>
    <main class="container py-5">
      <section
        class="card shadow border-0 rounded-4 mx-auto"
        style="max-width: 800px;"
      >
        <div class="card-body p-4">
          <h1 class="text-center mb-2">Lista de Tareas</h1>
          <p class="text-center text-muted mb-4">
            Agregar tareas, marca las que cpmpletes y elimina las que ya no
            necesites.
          </p>
          <div class="row g-3 mb-4">
            <input
              type="text"
              id="txtTarea"
              class="form-control"
              placeholder="Escribe una tarea."
            />
            <div class="col-12 col-md-3">
              <select id="prioridad" class="form-select">
                <option value="" selected disabled hidden>Prioridad</option>
                <option value="Alta">Alta</option>
                <option value="Media">Media</option>
                <option value="Baja">Baja</option>
              </select>
            </div>
            <div class="col-12 col-md-3 d-grid">
              <button id="btnAgregar" class="btn btn-primary">Agregar</button>
            </div>
          </div>

          <div id="listaTareas" class="d-flex flex-column gap-3">
            
          </div>

          <p id="contador" class="text-center fw-bold text-secondary mt-4">
            Tareas registradas: 0
          </p>
        </div>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
      crossorigin="anonymous"
    ></script>

    <script src="./js/controllers/index.controller.js"></script>
  </body>
</html>
